spring.datasource.url=jdbc:postgresql://localhost:5432/restaurant_db
spring.datasource.username=postgres
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=aVeryStrongSecretKeyForJwtThatIsAtLeast32Chars
jwt.expiration=3600000

server.port=8080

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:test@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=noreply@restaurant-platform.local

# Frontend Configuration
app.frontend.url=http://localhost:3000
app.api.url=http://localhost:8080

# Payment Gateway URLs (override per environment)
payment.gateway.vnpay.url=https://sandbox.vnpayment.vn/paymentgate/Embedded
payment.gateway.momo.url=https://test-payment.momo.vn/web/paymentgateway
payment.gateway.default.url=https://payment-gateway.restaurant.local/callback

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
