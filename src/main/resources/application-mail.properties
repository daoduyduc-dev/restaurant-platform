# Email Configuration - Development
# For production, override these with actual email provider credentials

# Gmail SMTP Configuration (for development/testing)
# To use: Create app-specific password at https://myaccount.google.com/apppasswords
# Then set SPRING_MAIL_USERNAME and SPRING_MAIL_PASSWORD environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:test@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email From Address
spring.mail.from=noreply@restaurant-platform.local

# Frontend URL for email links
app.frontend.url=http://localhost:3000
